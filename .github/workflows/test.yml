name: Test

on:
  workflow_run:
    workflows: [ "Build" ]
    types: [ completed ]
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EP Finder Test/EP Finder Test.csproj"

      - name: Build
        run: dotnet build "EP Finder Test/EP Finder Test.csproj" --no-restore --configuration Release

      - name: Install dotnet-coverage
        run: dotnet tool install -g dotnet-coverage

      - name: Test
        run: dotnet test --project "EP Finder Test/EP Finder Test.csproj" --no-build --configuration Release --coverage --coverage-output coverage.xml --coverage-output-format cobertura

      - name: Check coverage threshold
        shell: pwsh
        run: . .\.github\scripts\check-coverage.ps
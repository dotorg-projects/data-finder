name: Publish

on:
  workflow_run:
    workflows: [ "Help" ]
    types: [ completed ]
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EP Finder/EP Finder.csproj"

      - name: Build
        run: dotnet build "EP Finder/EP Finder.csproj" --no-restore --configuration Release

      - name: Publish
        run: dotnet nuget push "EP Finder/bin/Release/*.nupkg" --api-key ${{ secrets.NUGET_ORG_EP_KEY }} --source ${{ vars.NUGET_ORG_EP_URL }}
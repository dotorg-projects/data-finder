name: Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "EP Finder/EP Finder.csproj"

      - name: Build
        run: dotnet build "EP Finder/EP Finder.csproj" --no-restore --configuration Release

      - name: Publish
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem "EP Finder/bin/Release/*.nupkg" | Select-Object -First 1
          dotnet nuget push $nupkg.FullName --api-key ${{ secrets.NUGET_ORG_EP_KEY }} --source ${{ vars.NUGET_ORG_EP_URL }}